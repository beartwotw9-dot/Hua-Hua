<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Sanitized Invoice OCR Workflow</title>
  <desc id="desc">A portfolio-safe workflow diagram showing invoice image upload, OCR parsing, field cleanup, drive archiving, and category-based ledger routing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fbf8f2"/>
      <stop offset="100%" stop-color="#f1e9dc"/>
    </linearGradient>
    <linearGradient id="heroGlow" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#dceadf"/>
      <stop offset="100%" stop-color="#f6efe2"/>
    </linearGradient>
    <linearGradient id="routePanel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#eef6ef"/>
      <stop offset="100%" stop-color="#e4efe5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#b8aa91" flood-opacity=".18"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#b8aa91" flood-opacity=".12"/>
    </filter>
    <style>
      .title{font:700 40px 'Noto Sans TC',Arial,sans-serif;fill:#29231c}
      .eyebrow{font:700 15px 'Noto Sans TC',Arial,sans-serif;letter-spacing:.2em;text-transform:uppercase;fill:#9d7c52}
      .lead{font:400 21px 'Noto Sans TC',Arial,sans-serif;fill:#645949}
      .label{font:700 22px 'Noto Sans TC',Arial,sans-serif;fill:#355840}
      .sub{font:500 17px 'Noto Sans TC',Arial,sans-serif;fill:#5f5648}
      .small{font:400 15px 'Noto Sans TC',Arial,sans-serif;fill:#8a7e6d}
      .tiny{font:600 14px 'Noto Sans TC',Arial,sans-serif;fill:#6b9070}
      .card{fill:#fffdf9;stroke:#ddd0bc;stroke-width:2}
      .mini{fill:#fffdfa;stroke:#d8ccb8;stroke-width:2}
      .flow{stroke:#877867;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .dash{stroke:#c5b79f;stroke-width:3;stroke-dasharray:10 10;fill:none;stroke-linecap:round}
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="190" cy="128" r="160" fill="url(#heroGlow)" opacity=".78"/>
  <circle cx="1435" cy="780" r="210" fill="#e7f0e7" opacity=".4"/>

  <text x="800" y="88" text-anchor="middle" class="eyebrow">N8N · FINANCE AUTOMATION · SANITIZED VIEW</text>
  <text x="800" y="138" text-anchor="middle" class="title">Invoice OCR Classification &amp; Filing Workflow</text>
  <text x="800" y="178" text-anchor="middle" class="lead">Public-safe overview of how invoice images become structured, routed bookkeeping records.</text>

  <g filter="url(#soft)">
    <rect x="66" y="232" width="1458" height="430" rx="36" ry="36" fill="rgba(255,253,249,.74)" stroke="#e7ddcf" stroke-width="2"/>
    <rect x="1145" y="212" width="330" height="488" rx="34" ry="34" fill="url(#routePanel)" stroke="#cad9cb" stroke-width="2"/>
  </g>

  <g filter="url(#shadow)">
    <rect class="card" x="120" y="350" rx="28" ry="28" width="190" height="136"/>
    <text x="215" y="402" text-anchor="middle" class="label">1. Upload</text>
    <text x="215" y="438" text-anchor="middle" class="sub">Receipt form intake</text>
    <text x="215" y="466" text-anchor="middle" class="small">staff / category / image</text>

    <rect class="card" x="360" y="350" rx="28" ry="28" width="210" height="136"/>
    <text x="465" y="402" text-anchor="middle" class="label">2. Prep Image</text>
    <text x="465" y="438" text-anchor="middle" class="sub">Normalize &amp; compress</text>
    <text x="465" y="466" text-anchor="middle" class="small">OCR-ready JPEG pipeline</text>

    <rect class="card" x="620" y="350" rx="28" ry="28" width="210" height="136"/>
    <text x="725" y="402" text-anchor="middle" class="label">3. OCR Parse</text>
    <text x="725" y="438" text-anchor="middle" class="sub">Traditional Chinese OCR</text>
    <text x="725" y="466" text-anchor="middle" class="small">extract raw text content</text>

    <rect class="card" x="880" y="350" rx="28" ry="28" width="220" height="136"/>
    <text x="990" y="402" text-anchor="middle" class="label">4. Field Cleanup</text>
    <text x="990" y="438" text-anchor="middle" class="sub">Vendor / amount / date</text>
    <text x="990" y="466" text-anchor="middle" class="small">rename file &amp; structure record</text>

    <rect class="card" x="1140" y="290" rx="28" ry="28" width="220" height="126"/>
    <text x="1250" y="338" text-anchor="middle" class="label">5. Drive Archive</text>
    <text x="1250" y="372" text-anchor="middle" class="sub">Cloud storage</text>
    <text x="1250" y="398" text-anchor="middle" class="small">save image &amp; return file link</text>

    <rect class="card" x="1140" y="486" rx="28" ry="28" width="220" height="126"/>
    <text x="1250" y="534" text-anchor="middle" class="label">6. Route by Type</text>
    <text x="1250" y="568" text-anchor="middle" class="sub">Switch-based branching</text>
    <text x="1250" y="594" text-anchor="middle" class="small">send records into the right ledger</text>

    <rect class="mini" x="1388" y="272" rx="22" ry="22" width="110" height="78"/>
    <text x="1443" y="318" text-anchor="middle" class="tiny">Drive</text>

    <rect class="mini" x="1388" y="382" rx="22" ry="22" width="110" height="78"/>
    <text x="1443" y="428" text-anchor="middle" class="tiny">Payment</text>

    <rect class="mini" x="1388" y="482" rx="22" ry="22" width="110" height="78"/>
    <text x="1443" y="528" text-anchor="middle" class="tiny">General</text>

    <rect class="mini" x="1388" y="582" rx="22" ry="22" width="110" height="78"/>
    <text x="1443" y="628" text-anchor="middle" class="tiny">Fixed</text>

    <rect class="mini" x="1388" y="682" rx="22" ry="22" width="110" height="78"/>
    <text x="1443" y="728" text-anchor="middle" class="tiny">Tax / Petty</text>
  </g>

  <path class="flow" d="M310 418 H360"/>
  <path class="flow" d="M570 418 H620"/>
  <path class="flow" d="M830 418 H880"/>
  <path class="flow" d="M1100 418 H1140"/>
  <path class="flow" d="M1250 416 V486"/>
  <path class="flow" d="M1360 353 H1388"/>
  <path class="flow" d="M1360 548 C1380 548,1370 421,1388 421"/>
  <path class="flow" d="M1360 548 H1388"/>
  <path class="flow" d="M1360 548 C1380 548,1370 621,1388 621"/>
  <path class="flow" d="M1360 548 C1380 548,1370 721,1388 721"/>

  <path class="dash" d="M215 486 V620 H530"/>
  <path class="dash" d="M725 486 V620 H1050"/>

  <g filter="url(#soft)">
    <rect class="card" x="300" y="690" rx="26" ry="26" width="320" height="116"/>
    <text x="460" y="738" text-anchor="middle" class="label">Finance Use Case</text>
    <text x="460" y="772" text-anchor="middle" class="sub">Reduce repetitive invoice admin work</text>
    <text x="460" y="796" text-anchor="middle" class="small">from one upload to searchable records</text>

    <rect class="card" x="690" y="690" rx="26" ry="26" width="320" height="116"/>
    <text x="850" y="738" text-anchor="middle" class="label">Structured Outputs</text>
    <text x="850" y="772" text-anchor="middle" class="sub">Fields, links, and ledger-ready rows</text>
    <text x="850" y="796" text-anchor="middle" class="small">designed for everyday bookkeeping workflows</text>

    <rect class="card" x="1080" y="690" rx="26" ry="26" width="320" height="116"/>
    <text x="1240" y="738" text-anchor="middle" class="label">Routing Logic</text>
    <text x="1240" y="772" text-anchor="middle" class="sub">Category-based filing across sheets</text>
    <text x="1240" y="796" text-anchor="middle" class="small">keeps records organized without exposing internal IDs</text>
  </g>
</svg>
