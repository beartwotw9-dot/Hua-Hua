<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Sanitized Invoice OCR Workflow</title>
  <desc id="desc">A simplified portfolio-safe workflow diagram for invoice OCR classification and filing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fbf8f3"/>
      <stop offset="100%" stop-color="#f2eadf"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fdf8f0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#e9f3eb"/>
      <stop offset="100%" stop-color="#f2f7f1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#b7a88f" flood-opacity=".14"/>
    </filter>
    <style>
      .eyebrow{font:700 14px 'Noto Sans TC',Arial,sans-serif;letter-spacing:.24em;text-transform:uppercase;fill:#9a7b54}
      .title{font:700 42px 'Noto Sans TC',Arial,sans-serif;fill:#241f18}
      .lead{font:400 22px 'Noto Sans TC',Arial,sans-serif;fill:#655b4c}
      .section{font:700 16px 'Noto Sans TC',Arial,sans-serif;letter-spacing:.16em;text-transform:uppercase;fill:#9a7b54}
      .cardTitle{font:700 28px 'Noto Sans TC',Arial,sans-serif;fill:#355840}
      .cardBody{font:500 20px 'Noto Sans TC',Arial,sans-serif;fill:#5f5648}
      .cardMeta{font:400 17px 'Noto Sans TC',Arial,sans-serif;fill:#8a7d6a}
      .miniTitle{font:700 21px 'Noto Sans TC',Arial,sans-serif;fill:#355840}
      .miniMeta{font:500 16px 'Noto Sans TC',Arial,sans-serif;fill:#736755}
      .pill{font:700 18px 'Noto Sans TC',Arial,sans-serif;fill:#4f7355}
      .frame{fill:url(#panel);stroke:#e4d7c4;stroke-width:2}
      .routeFrame{fill:url(#accent);stroke:#d7e5d8;stroke-width:2}
      .card{fill:#fffdfa;stroke:#ddd1be;stroke-width:2}
      .line{stroke:#847563;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="210" cy="130" r="170" fill="#f4efe4"/>
  <circle cx="1400" cy="760" r="180" fill="#eef5ef" opacity=".55"/>

  <text x="800" y="88" text-anchor="middle" class="eyebrow">N8N · SANITIZED WORKFLOW · FINANCE AUTOMATION</text>
  <text x="800" y="148" text-anchor="middle" class="title">Invoice OCR Classification &amp; Filing</text>
  <text x="800" y="194" text-anchor="middle" class="lead">A cleaner internal workflow for turning uploaded invoice images into structured records and categorized ledger entries.</text>

  <g filter="url(#shadow)">
    <rect class="frame" x="84" y="250" rx="34" ry="34" width="1432" height="560"/>
    <rect class="routeFrame" x="1088" y="282" rx="30" ry="30" width="356" height="336"/>
  </g>

  <text x="144" y="302" class="section">Input</text>
  <text x="500" y="302" class="section">Processing</text>
  <text x="1140" y="332" class="section">Outputs</text>

  <g filter="url(#shadow)">
    <rect class="card" x="132" y="356" rx="28" ry="28" width="256" height="190"/>
    <text x="168" y="414" class="cardTitle">1. Upload</text>
    <text x="168" y="454" class="cardBody">Receipt image form</text>
    <text x="168" y="489" class="cardMeta">staff name / expense type / file</text>

    <rect class="card" x="448" y="356" rx="28" ry="28" width="256" height="190"/>
    <text x="484" y="414" class="cardTitle">2. Prep</text>
    <text x="484" y="454" class="cardBody">Normalize and compress</text>
    <text x="484" y="489" class="cardMeta">make the image OCR-ready</text>

    <rect class="card" x="764" y="356" rx="28" ry="28" width="256" height="190"/>
    <text x="800" y="414" class="cardTitle">3. OCR + Parse</text>
    <text x="800" y="454" class="cardBody">Extract key fields</text>
    <text x="800" y="489" class="cardMeta">vendor / amount / date / invoice info</text>

    <rect class="card" x="1124" y="370" rx="24" ry="24" width="284" height="94"/>
    <text x="1160" y="424" class="miniTitle">Drive archive</text>
    <text x="1160" y="448" class="miniMeta">save image and return file link</text>

    <rect class="card" x="1124" y="494" rx="24" ry="24" width="284" height="94"/>
    <text x="1160" y="548" class="miniTitle">Ledger routing</text>
    <text x="1160" y="572" class="miniMeta">send to the right bookkeeping tab</text>

    <rect class="card" x="118" y="648" rx="26" ry="26" width="404" height="116"/>
    <text x="320" y="694" text-anchor="middle" class="pill">Why it matters</text>
    <text x="320" y="730" text-anchor="middle" class="cardBody">Cuts repetitive finance admin work</text>

    <rect class="card" x="598" y="648" rx="26" ry="26" width="404" height="116"/>
    <text x="800" y="694" text-anchor="middle" class="pill">Structured result</text>
    <text x="800" y="730" text-anchor="middle" class="cardBody">Files, fields, and ledger-ready rows</text>

    <rect class="card" x="1078" y="648" rx="26" ry="26" width="404" height="116"/>
    <text x="1280" y="694" text-anchor="middle" class="pill">Routing logic</text>
    <text x="1280" y="730" text-anchor="middle" class="cardBody">Payment / General / Fixed / Tax / Petty</text>
  </g>

  <path class="line" d="M388 450 H448"/>
  <path class="line" d="M704 450 H764"/>
  <path class="line" d="M1020 450 H1088"/>
  <path class="line" d="M1266 464 V494"/>

  <circle cx="1088" cy="450" r="8" fill="#847563"/>
  <circle cx="448" cy="450" r="8" fill="#847563"/>
  <circle cx="764" cy="450" r="8" fill="#847563"/>
</svg>
