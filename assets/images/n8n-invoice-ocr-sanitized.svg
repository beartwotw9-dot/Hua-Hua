<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1012" viewBox="0 0 1800 1012" role="img" aria-labelledby="title desc">
  <title id="title">n8n Invoice OCR Classification and Filing Workflow</title>
  <desc id="desc">A portfolio-safe workflow evidence graphic showing invoice image intake, OCR parsing, file archiving, and ledger routing.</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#07120d" flood-opacity=".26"/>
    </filter>
    <style>
      .bg{fill:#0f1c17}
      .panel{fill:#f5f1e8;stroke:#d8e8dd;stroke-width:4}
      .node{fill:#fffdf7;stroke:#d8cbb9;stroke-width:3}
      .output{fill:#eef7ef;stroke:#bfd9c6;stroke-width:3}
      .title{font:700 30px Arial,sans-serif;fill:#ffffff}
      .lead{font:400 18px Arial,sans-serif;fill:#bdd1c6}
      .label{font:700 14px Arial,sans-serif;fill:#ffffff}
      .section{font:700 16px Arial,sans-serif;letter-spacing:.18em;fill:#9b815e;text-transform:uppercase}
      .nodeTitle{font:700 29px Arial,sans-serif;fill:#315b42}
      .nodeText{font:400 20px Arial,sans-serif;fill:#62594c}
      .smallText{font:400 16px Arial,sans-serif;fill:#827664}
      .chip{font:400 14px Arial,sans-serif;fill:#ccebd9}
      .line{stroke:#7d715f;stroke-width:5;fill:none;stroke-linecap:round}
      .dot{fill:#7d715f}
    </style>
  </defs>

  <rect class="bg" width="1800" height="1012"/>
  <text class="title" x="72" y="84">n8n Invoice OCR Classification and Filing</text>
  <text class="lead" x="72" y="146">Receipt image -&gt; compression -&gt; OCR parsing -&gt; Drive archive and ledger routing</text>

  <g filter="url(#softShadow)">
    <rect class="panel" x="70" y="230" width="1660" height="700" rx="32"/>
  </g>

  <rect x="100" y="260" width="282" height="48" rx="22" fill="#17a34a"/>
  <text class="label" x="124" y="289">Workflow evidence</text>

  <text class="section" x="130" y="372">Input</text>
  <text class="section" x="510" y="372">Processing</text>
  <text class="section" x="1248" y="372">Outputs</text>

  <g filter="url(#softShadow)">
    <rect class="node" x="130" y="420" width="292" height="178" rx="26"/>
    <text class="nodeTitle" x="166" y="484">1. Upload</text>
    <text class="nodeText" x="166" y="526">Receipt image form</text>
    <text class="smallText" x="166" y="562">staff / category / file</text>

    <rect class="node" x="510" y="420" width="292" height="178" rx="26"/>
    <text class="nodeTitle" x="546" y="484">2. Prep</text>
    <text class="nodeText" x="546" y="526">Compress and normalize</text>
    <text class="smallText" x="546" y="562">make the image OCR-ready</text>

    <rect class="node" x="890" y="420" width="292" height="178" rx="26"/>
    <text class="nodeTitle" x="926" y="484">3. OCR + Parse</text>
    <text class="nodeText" x="926" y="526">Extract key fields</text>
    <text class="smallText" x="926" y="562">vendor / amount / date</text>

    <rect class="output" x="1248" y="392" width="360" height="244" rx="30"/>
    <rect class="node" x="1282" y="436" width="292" height="76" rx="22"/>
    <text class="nodeText" x="1320" y="482" font-weight="700">Drive archive</text>
    <rect class="node" x="1282" y="540" width="292" height="76" rx="22"/>
    <text class="nodeText" x="1320" y="586" font-weight="700">Ledger routing</text>

    <rect class="node" x="130" y="728" width="388" height="112" rx="24"/>
    <text class="nodeText" x="324" y="775" text-anchor="middle" font-weight="700" fill="#315b42">Why it matters</text>
    <text class="nodeText" x="324" y="812" text-anchor="middle">Less repetitive finance admin</text>

    <rect class="node" x="706" y="728" width="388" height="112" rx="24"/>
    <text class="nodeText" x="900" y="775" text-anchor="middle" font-weight="700" fill="#315b42">Structured result</text>
    <text class="nodeText" x="900" y="812" text-anchor="middle">Files, fields, and rows</text>

    <rect class="node" x="1282" y="728" width="388" height="112" rx="24"/>
    <text class="nodeText" x="1476" y="775" text-anchor="middle" font-weight="700" fill="#315b42">Routing logic</text>
    <text class="nodeText" x="1476" y="812" text-anchor="middle">Payment / Tax / Petty</text>
  </g>

  <path class="line" d="M422 509 H510"/>
  <path class="line" d="M802 509 H890"/>
  <path class="line" d="M1182 509 H1248"/>
  <path class="line" d="M1428 512 V540"/>
  <circle class="dot" cx="422" cy="509" r="11"/>
  <circle class="dot" cx="802" cy="509" r="11"/>
  <circle class="dot" cx="1182" cy="509" r="11"/>

  <g>
    <rect x="70" y="960" width="128" height="38" rx="18" fill="#11251d" stroke="#17a34a" stroke-width="2"/>
    <text class="chip" x="134" y="984" text-anchor="middle">n8n Form</text>
    <rect x="216" y="960" width="150" height="38" rx="18" fill="#11251d" stroke="#17a34a" stroke-width="2"/>
    <text class="chip" x="291" y="984" text-anchor="middle">OCR.space</text>
    <rect x="384" y="960" width="150" height="38" rx="18" fill="#11251d" stroke="#17a34a" stroke-width="2"/>
    <text class="chip" x="459" y="984" text-anchor="middle">Google Drive</text>
    <rect x="552" y="960" width="150" height="38" rx="18" fill="#11251d" stroke="#17a34a" stroke-width="2"/>
    <text class="chip" x="627" y="984" text-anchor="middle">Google Sheets</text>
    <rect x="720" y="960" width="162" height="38" rx="18" fill="#11251d" stroke="#17a34a" stroke-width="2"/>
    <text class="chip" x="801" y="984" text-anchor="middle">Ledger Routing</text>
  </g>
</svg>
